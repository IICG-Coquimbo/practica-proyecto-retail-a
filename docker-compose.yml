services:
  # Contenedor principal con Jupyter, Spark y entorno visual
  workspace:
    build: .
    container_name: bigdata_workspace
    platform: linux/amd64
    ports:
      - "8888:8888"   # Jupyter Lab
      - "4040:4040"   # Interfaz web de Spark
      - "5900:5900"   # Acceso VNC al escritorio
      - "6080:6080"   # Acceso noVNC desde navegador
    volumes:
      - .:/home/jovyan/work
    environment:
      - JUPYTER_TOKEN=
      - JUPYTER_PASSWORD=iicg2026
      - JUPYTER_ALLOW_INSECURE_WRITES=true
      - DISPLAY=:99
    shm_size: "2gb"
    depends_on:
      - mongodb

  # Base de datos MongoDB
  mongodb:
    image: mongo:latest
    container_name: bigdata_mongodb
    platform: linux/amd64
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Interfaz web para visualizar MongoDB
  admin-db:
    image: mongo-express:latest
    container_name: bigdata_ui
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017/
    depends_on:
      - mongodb

volumes:
  mongo_data: